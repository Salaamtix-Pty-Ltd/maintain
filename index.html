<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site Under Maintenance</title>
    <meta
      name="description"
      content="The site is temporarily under maintenance. We'll be back shortly."
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3f4f6;
        padding: 24px;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
        color: #111827;
      }
      .container {
        max-width: 820px;
        width: 100%;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.08);
        padding: 44px 48px;
        text-align: center;
      }
      .logo-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 18px;
      }
      .logo {
        width: 260px;
        height: auto;
        object-fit: contain;
      }
      @media (max-width: 640px) {
        .logo {
          width: 180px;
        }
      }
      h1 {
        margin: 8px 0 0 0;
        font-size: 30px;
        font-weight: 800;
        color: #0f172a;
      }
      .estimated {
        margin-top: 18px;
      }
      .estimated strong {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: #0f172a;
      }
      .estimated span {
        color: #374151;
        display: block;
        margin-top: 8px;
        font-weight: 600;
      }
      .note {
        margin-top: 28px;
        color: #6b7280;
        font-size: 13px;
      }
      a {
        color: #2563eb;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-wrap">
        <img
          src="./nav-logo.svg"
          alt="logo"
          class="logo"
          width="310"
          height="54"
        />
      </div>
      <div style="  margin-left: 15px;">
        <h1
          style="
            margin: 0px;
            font-size: 28px;
            font-weight: 700;
          
          "
        >
          We'll be back soon
        </h1>

        <div class="estimated">
          <strong>Estimated time:</strong>
          <span>Up to 1 or 2 hours</span>
        </div>

        <div class="note">
          If you need urgent help, contact support at
          <a href="mailto:admin@salaamtix.com">admin@salaamtix.com</a>
        </div>
      </div>
    </div>
  </body>
</html>
